# Environment for cjm-graph-plugin-sqlite
# Provides a local, file-backed Context Graph implementation using SQLite
name: cjm-graph-plugin-sqlite
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    # Stage 8 (Option C): the substrate is AUTO-INJECTED by install-all
    # (schema v2), so it is no longer listed here. The tool depends only on the
    # graph data nouns (cjm-context-graph-primitives), not the dissolved
    # cjm-graph-plugin-system domain interface lib.
    - cjm-context-graph-primitives

    # Utilities
    - fastcore
    
    # Worker dependencies
    - fastapi
    - uvicorn
    - psutil
    - httpx